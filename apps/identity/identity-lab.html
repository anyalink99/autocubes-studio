<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>autocubes identity lab</title>
  <style>
    :root {
      color: #f3f3ef;
      background: #0a0a09;
      font-family: Arial, Helvetica, sans-serif;
      font-synthesis: none;
      --orange: #ff5a2f;
      --paper: #f0f0eb;
      --ink: #090909;
      --line: #292925;
      --muted: #8b8c85;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-width: 320px; background: #0a0a09; }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button { color: inherit; }
    .lab-header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 68px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 10, 9, .94);
      backdrop-filter: blur(16px);
    }
    .lab-brand { display: flex; align-items: center; gap: 10px; min-width: 220px; color: inherit; text-decoration: none; }
    .lab-brand img { width: 25px; height: 25px; filter: invert(1); }
    .lab-brand strong { font-size: 14px; }
    .lab-brand span { display: block; margin-top: 2px; color: var(--muted); font: 600 9px Arial, Helvetica, sans-serif; letter-spacing: 1.3px; text-transform: uppercase; }
    .filters { display: flex; align-items: center; gap: 4px; min-width: 0; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter, .tool-button {
      height: 32px;
      padding: 0 11px;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #a5a69f;
      background: transparent;
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
    }
    .filter:hover, .filter.active { color: #fff; border-color: #3a3a35; background: #1b1b19; }
    .header-spacer { flex: 1; }
    .counter { color: var(--muted); font: 600 10px Arial, Helvetica, sans-serif; white-space: nowrap; }
    .tool-button { border-color: #393a35; color: #eee; background: #191917; }
    .tool-button:hover { border-color: #60615a; background: #232320; }
    .tool-button.accent { border-color: var(--orange); color: #150d09; background: var(--orange); font-weight: 700; }
    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(260px, .6fr);
      gap: 48px;
      padding: 58px 22px 46px;
      border-bottom: 1px solid var(--line);
    }
    .intro h1 { max-width: 950px; margin: 0; font-size: clamp(40px, 5.4vw, 82px); line-height: .92; letter-spacing: -4px; }
    .intro h1 em { color: var(--orange); font-style: normal; }
    .intro-copy { align-self: end; max-width: 430px; color: #a4a59f; font-size: 13px; line-height: 1.55; }
    .intro-copy b { color: #f4f4ef; font-weight: 600; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 34px 18px;
      padding: 22px 22px 110px;
    }
    .composition { min-width: 0; }
    .composition[hidden] { display: none; }
    .card-head { height: 34px; display: flex; align-items: center; gap: 7px; color: #85867f; font: 600 9px Arial, Helvetica, sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .card-head .family { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-head .spacer { flex: 1; }
    .pick-button { width: 24px; height: 24px; display: grid; place-items: center; padding: 0; border: 1px solid #353630; border-radius: 3px; color: #777871; background: transparent; cursor: pointer; }
    .pick-button:hover { color: #fff; border-color: #6a6b64; }
    .composition.picked .pick-button { color: #0b0907; border-color: var(--orange); background: var(--orange); }
    .variant-nav { display: flex; align-items: center; height: 24px; border: 1px solid #34352f; border-radius: 3px; overflow: hidden; }
    .variant-nav button { width: 24px; height: 22px; padding: 0; border: 0; color: #8e8f88; background: transparent; cursor: pointer; }
    .variant-nav button:hover { color: #fff; background: #242420; }
    .variant-nav span { min-width: 38px; text-align: center; color: #c3c4bd; font-size: 8px; letter-spacing: .5px; }
    .artboard {
      --accent: #ff5a2f;
      --accent2: #ffb09a;
      position: relative;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      color: #f6f6f2;
      background: #050505;
      isolation: isolate;
      cursor: zoom-in;
      container-type: inline-size;
    }
    .artboard::after { content: ""; position: absolute; inset: 0; border: 1px solid rgba(255,255,255,.08); pointer-events: none; z-index: 9; }
    .artboard.light { color: #0a0a09; background: #eeeFEa; }
    .artboard.orange { color: #0b0908; background: var(--accent); }
    .artboard.orange.layout-stat .caption,
    .artboard.orange.layout-service .service-index,
    .artboard.orange.layout-split .copy p,
    .artboard.orange.layout-vertical .copy p,
    .artboard.orange.layout-index .work-item span,
    .artboard.orange.layout-contact .email,
    .artboard.orange.layout-type .footline { color: rgba(9, 9, 8, .72); }
    .artboard.orange.layout-manifesto .line:nth-child(4) { color: rgba(9, 9, 8, .55); }
    .artboard.orange.layout-ascii .ascii { color: rgba(9, 9, 8, .4); }
    .artboard.orange.layout-stat .stat,
    .artboard.orange.layout-focus h2 em,
    .artboard.orange.layout-contact h2 span,
    .artboard.orange.layout-type h2 span,
    .artboard.orange.layout-vertical .vertical-word,
    .artboard.orange.layout-index .work-item small,
    .artboard.orange.layout-manifesto .line:nth-child(2) { color: #090908; }
    .artboard.orange.layout-stat .rail { background: #090908; }
    .artboard.orange.v5.layout-stat .stat { color: transparent; -webkit-text-stroke-color: #090908; }
    .artboard.blue { --accent: #78aaff; --accent2: #bfffd9; }
    .artboard.lilac { --accent: #a889ff; --accent2: #ffd2ea; }
    .artboard.green { --accent: #a4db78; --accent2: #e6ffc9; }
    .artboard .logo { position: absolute; width: 8%; aspect-ratio: 1; z-index: 5; }
    .artboard:not(.light):not(.orange) .logo { filter: invert(1); }
    .artboard .mono { font-family: Arial, Helvetica, sans-serif; font-weight: 650; letter-spacing: .08em; text-transform: uppercase; }
    .artboard .arrow { font-size: 1.4em; line-height: 1; }
    .artboard .project-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artboard .grain { position: absolute; inset: 0; opacity: .12; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E"); mix-blend-mode: soft-light; pointer-events: none; z-index: 4; }
    .brand-lockup { position: absolute; display: flex; align-items: center; gap: 3%; z-index: 5; }
    .brand-lockup img { width: 12%; aspect-ratio: 1; }
    .brand-lockup span { font-weight: 750; letter-spacing: -.05em; }
    .artboard:not(.light):not(.orange) .brand-lockup img { filter: invert(1); }
    .slabs { position: absolute; width: 115%; height: 48%; transform: rotate(-8deg); }
    .slab { position: absolute; width: 74%; height: 28%; right: 0; border-radius: 2.2em; background: linear-gradient(115deg, color-mix(in srgb, var(--accent) 60%, #111), var(--accent2), var(--accent)); border: 1px solid color-mix(in srgb, var(--accent2) 65%, white); box-shadow: 0 1.4em 2em rgba(0,0,0,.46), inset 0 .25em .5em rgba(255,255,255,.18), inset 0 -.5em 1em rgba(0,0,0,.25); }
    .slab:nth-child(1) { top: -2%; right: 30%; }
    .slab:nth-child(2) { top: 25%; right: 14%; }
    .slab:nth-child(3) { top: 52%; right: -2%; }
    .slab img { position: absolute; right: 8%; top: 25%; width: 15%; height: 50%; }
    .artboard:not(.orange) .slab img { opacity: .88; }
    .layout-brand .brand-lockup { left: 9%; right: 9%; top: 50%; justify-content: center; transform: translateY(-50%); }
    .layout-brand .brand-lockup img { width: 19%; }
    .layout-brand .brand-lockup span { min-width: 0; font-size: clamp(22px, 11cqw, 72px); white-space: nowrap; }
    .layout-brand .meta-a, .layout-brand .meta-b { position: absolute; bottom: 5%; z-index: 5; font-size: clamp(6px, 2.1cqw, 11px); }
    .layout-brand .meta-a { left: 6%; }
    .layout-brand .meta-b { right: 6%; color: var(--accent); }
    .layout-focus .slabs { top: -2%; left: -8%; }
    .layout-focus h2 { position: absolute; left: 7%; top: 48%; width: 72%; margin: 0; font-size: clamp(34px, 13cqw, 86px); line-height: .9; letter-spacing: -.06em; z-index: 5; }
    .layout-focus h2 em { color: var(--accent); font-style: normal; }
    .layout-focus .brand-lockup { left: 7%; bottom: 5%; width: 34%; }
    .layout-focus .brand-lockup span { font-size: clamp(9px, 3cqw, 19px); }
    .layout-focus .slide-no { position: absolute; right: 7%; bottom: 5%; color: var(--accent); font-size: clamp(6px, 2.1cqw, 11px); }
    .layout-service { padding: 7%; }
    .layout-service .logo { top: 6%; left: 7%; }
    .layout-service .kicker { position: absolute; top: 7%; right: 7%; font-size: clamp(6px, 2.1cqw, 11px); }
    .layout-service h2 { position: absolute; left: 7%; right: 7%; bottom: 24%; margin: 0; font-size: clamp(30px, 11cqw, 76px); line-height: .9; letter-spacing: -.055em; }
    .layout-service .service-index { position: absolute; left: 7%; right: 7%; bottom: 6%; padding-top: 3%; border-top: 1px solid currentColor; font-size: clamp(6px, 2cqw, 10px); }
    .layout-service .orb { position: absolute; top: 18%; left: 19%; width: 62%; aspect-ratio: 1; border-radius: 22%; transform: rotate(28deg); background: radial-gradient(circle at 35% 30%, var(--accent2), var(--accent) 42%, #0b0b0a 76%); box-shadow: 0 3em 5em rgba(0,0,0,.45); }
    .layout-case .media { position: absolute; inset: 0; }
    .layout-case .media::after { content: ""; position: absolute; inset: 40% 0 0; background: linear-gradient(transparent, rgba(0,0,0,.92)); }
    .layout-case .case-copy { position: absolute; left: 7%; right: 7%; bottom: 7%; z-index: 5; }
    .layout-case .case-copy .mono { display: block; margin-bottom: 3%; color: var(--accent); font-size: clamp(6px, 2cqw, 10px); }
    .layout-case .case-copy h2 { margin: 0 0 3%; font-size: clamp(28px, 10cqw, 72px); line-height: .9; letter-spacing: -.055em; }
    .layout-case .case-copy p { max-width: 78%; margin: 0; color: rgba(255,255,255,.72); font-size: clamp(7px, 2.5cqw, 13px); line-height: 1.35; }
    .layout-split { display: grid; grid-template-rows: 53% 47%; }
    .layout-split .image-wrap { overflow: hidden; }
    .layout-split .copy { position: relative; padding: 7%; }
    .layout-split .copy h2 { max-width: 88%; margin: 10% 0 4%; font-size: clamp(28px, 9cqw, 65px); line-height: .92; letter-spacing: -.05em; }
    .layout-split .copy p { max-width: 75%; margin: 0; color: #76766f; font-size: clamp(7px, 2.4cqw, 12px); line-height: 1.4; }
    .layout-split .copy .arrow { position: absolute; right: 7%; bottom: 8%; }
    .layout-type { padding: 7%; }
    .layout-type .logo { left: 7%; top: 6%; }
    .layout-type h2 { position: absolute; left: 7%; right: 7%; top: 27%; margin: 0; font-size: clamp(37px, 14cqw, 94px); line-height: .86; letter-spacing: -.07em; }
    .layout-type h2 span { color: var(--accent); }
    .layout-type .footline { position: absolute; left: 7%; right: 7%; bottom: 7%; display: flex; justify-content: space-between; padding-top: 3%; border-top: 1px solid currentColor; font-size: clamp(6px, 2cqw, 10px); }
    .layout-stat { padding: 7%; }
    .layout-stat .stat { position: absolute; left: 6%; top: 17%; font-size: clamp(70px, 25cqw, 185px); font-weight: 750; line-height: .8; letter-spacing: -.09em; color: var(--accent); }
    .layout-stat h2 { position: absolute; left: 7%; right: 18%; bottom: 20%; margin: 0; font-size: clamp(24px, 9cqw, 64px); line-height: .95; letter-spacing: -.05em; }
    .layout-stat .caption { position: absolute; left: 7%; bottom: 7%; width: 60%; color: #8c8d86; font-size: clamp(7px, 2.3cqw, 12px); line-height: 1.4; }
    .layout-stat .rail { position: absolute; right: 6%; top: 7%; bottom: 7%; width: 7%; background: var(--accent); }
    .layout-process { padding: 7%; }
    .layout-process h2 { margin: 4% 0 12%; font-size: clamp(28px, 10cqw, 72px); line-height: .9; letter-spacing: -.05em; }
    .steps { display: grid; gap: 0; border-top: 1px solid currentColor; }
    .step { display: grid; grid-template-columns: 16% 1fr auto; align-items: center; padding: 5% 0; border-bottom: 1px solid currentColor; font-size: clamp(8px, 3.3cqw, 19px); }
    .step b { color: var(--accent); font: inherit; }
    .step span:last-child { opacity: .5; }
    .layout-index { padding: 7%; }
    .layout-index .brand-lockup { left: 7%; top: 6%; width: 34%; }
    .layout-index .brand-lockup span { font-size: clamp(9px, 3cqw, 19px); }
    .work-list { position: absolute; left: 7%; right: 7%; top: 24%; }
    .work-item { display: grid; grid-template-columns: 12% 1fr auto; align-items: baseline; padding: 4.5% 0; border-top: 1px solid currentColor; }
    .work-item:last-child { border-bottom: 1px solid currentColor; }
    .work-item small { color: var(--accent); font: 650 clamp(6px, 1.8cqw, 9px) Arial, Helvetica, sans-serif; }
    .work-item strong { font-size: clamp(12px, 4cqw, 25px); }
    .work-item span { color: #777871; font-size: clamp(6px, 2cqw, 10px); }
    .layout-contact { padding: 7%; }
    .layout-contact .logo { left: 7%; top: 6%; }
    .layout-contact h2 { position: absolute; left: 7%; right: 7%; top: 27%; margin: 0; font-size: clamp(38px, 14cqw, 96px); line-height: .86; letter-spacing: -.07em; }
    .layout-contact h2 span { color: var(--accent); }
    .layout-contact .email { position: absolute; left: 7%; bottom: 12%; padding-bottom: 3%; border-bottom: 2px solid var(--accent); font-size: clamp(10px, 3.5cqw, 22px); }
    .layout-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1px; background: #272723; }
    .layout-grid .cell { position: relative; overflow: hidden; background: #050505; }
    .layout-grid .cell.image img { width: 100%; height: 100%; object-fit: cover; }
    .layout-grid .cell.word { display: flex; align-items: flex-end; padding: 8%; font-size: clamp(18px, 6cqw, 42px); font-weight: 700; line-height: .92; letter-spacing: -.05em; }
    .layout-grid .cell.mark { display: grid; place-items: center; background: var(--accent); }
    .layout-grid .cell.mark img { width: 38%; }
    .layout-grid .cell.info { display: flex; flex-direction: column; justify-content: space-between; padding: 8%; }
    .layout-grid .cell.info b { font-size: clamp(11px, 3.6cqw, 24px); }
    .layout-grid .cell.info span { color: #888982; font-size: clamp(6px, 1.8cqw, 10px); line-height: 1.4; }
    .layout-vertical { padding: 7%; }
    .layout-vertical .vertical-word { position: absolute; left: -3%; top: 7%; writing-mode: vertical-rl; transform: rotate(180deg); font-size: clamp(42px, 16cqw, 112px); font-weight: 750; line-height: .8; letter-spacing: -.07em; color: var(--accent); }
    .layout-vertical .image-panel { position: absolute; left: 28%; right: 7%; top: 7%; height: 56%; overflow: hidden; }
    .layout-vertical .copy { position: absolute; left: 28%; right: 7%; bottom: 7%; }
    .layout-vertical .copy h2 { margin: 0 0 5%; font-size: clamp(22px, 7cqw, 52px); line-height: .92; letter-spacing: -.05em; }
    .layout-vertical .copy p { margin: 0; color: #85867f; font-size: clamp(7px, 2.2cqw, 11px); line-height: 1.4; }
    .layout-ascii { padding: 7%; }
    .layout-ascii .ascii { position: absolute; inset: 8% 6% 31%; overflow: hidden; color: var(--accent); font: 650 clamp(6px, 2cqw, 12px)/1.15 Arial, Helvetica, sans-serif; white-space: pre-wrap; word-break: break-all; opacity: .85; }
    .layout-ascii h2 { position: absolute; left: 7%; right: 7%; bottom: 8%; margin: 0; font-size: clamp(28px, 10cqw, 72px); line-height: .88; letter-spacing: -.06em; }
    .layout-band { display: grid; grid-template-rows: 39% 22% 39%; }
    .layout-band .band-image { overflow: hidden; }
    .layout-band .band-copy { display: flex; align-items: center; justify-content: space-between; gap: 5%; padding: 4% 7%; background: var(--accent); color: #090909; }
    .layout-band .band-copy strong { font-size: clamp(18px, 5.8cqw, 42px); letter-spacing: -.05em; }
    .layout-band .band-copy span { font-size: clamp(6px, 1.8cqw, 10px); }
    .layout-manifesto { padding: 7%; }
    .layout-manifesto .line { font-size: clamp(22px, 7.8cqw, 56px); font-weight: 700; line-height: .94; letter-spacing: -.055em; }
    .layout-manifesto .line + .line { margin-top: 3%; }
    .layout-manifesto .line:nth-child(2) { color: var(--accent); text-align: right; }
    .layout-manifesto .line:nth-child(4) { color: #6d6e68; }
    .layout-manifesto .brand-lockup { left: 7%; bottom: 6%; width: 34%; }
    .layout-manifesto .brand-lockup span { font-size: clamp(9px, 3cqw, 19px); }
    .v1.layout-focus .slabs { left: -2%; transform: rotate(7deg) scaleX(-1); }
    .v1.layout-focus h2 { left: auto; right: 7%; text-align: right; }
    .v1.layout-service .orb { left: auto; right: 8%; border-radius: 50%; }
    .v1.layout-type h2, .v1.layout-contact h2 { text-align: right; }
    .v1.layout-case .project-image { object-position: 70% center; }
    .v1.layout-split { grid-template-rows: 42% 58%; }
    .v1.layout-vertical .image-panel { left: 7%; right: 28%; }
    .v1.layout-vertical .vertical-word { left: auto; right: -3%; }
    .v1.layout-vertical .copy { left: 7%; right: 28%; }
    .v2.layout-brand { background: var(--accent); color: #080807; }
    .v2.layout-brand .brand-lockup { top: 12%; bottom: 12%; flex-direction: column; align-items: flex-start; justify-content: space-between; transform: none; }
    .v2.layout-brand .brand-lockup img { width: 28%; filter: none; }
    .v2.layout-focus .slabs { top: 31%; transform: rotate(-18deg); }
    .v2.layout-focus h2 { top: 9%; }
    .v2.layout-service .orb { width: 75%; top: 14%; left: -17%; border-radius: 50%; }
    .v2.layout-case .media { inset: 5%; }
    .v2.layout-case .media::after { inset: 25% 0 0; }
    .v2.layout-case .case-copy { bottom: 10%; }
    .v2.layout-type h2 { top: 46%; }
    .v2.layout-grid { transform: rotate(2deg) scale(1.04); }
    .v3.layout-brand .brand-lockup { left: 7%; top: 8%; bottom: 8%; flex-direction: column; align-items: flex-start; justify-content: center; transform: none; }
    .v3.layout-brand .brand-lockup img { width: 34%; margin-bottom: 12%; }
    .v3.layout-focus h2 { top: 18%; }
    .v3.layout-focus .slabs { top: 54%; left: -17%; }
    .v3.layout-service .orb { transform: rotate(-18deg); border-radius: 3%; }
    .v3.layout-case .project-image, .v3.layout-split .project-image, .v3.layout-vertical .project-image { filter: grayscale(1); }
    .v3.layout-case .case-copy h2, .v3.layout-split h2, .v3.layout-vertical h2 { color: var(--accent); }
    .v3.layout-stat .rail { width: 20%; right: -8%; transform: rotate(8deg); }
    .v4.layout-brand .brand-lockup { top: auto; bottom: 10%; transform: none; }
    .v4.layout-brand::before { content: ""; position: absolute; left: 0; right: 0; top: 12%; height: 22%; background: var(--accent); }
    .v4.layout-focus .slab { border-radius: 0; }
    .v4.layout-service .orb { top: 8%; width: 78%; border-radius: 50% 8% 50% 8%; }
    .v4.layout-case .media::after { inset: 0; background: linear-gradient(90deg,rgba(0,0,0,.92),transparent 85%); }
    .v4.layout-case .case-copy { top: 12%; bottom: auto; width: 58%; }
    .v4.layout-split { grid-template-columns: 42% 58%; grid-template-rows: 1fr; }
    .v4.layout-process .steps { transform: translateY(8%); }
    .v5.layout-brand { box-shadow: inset 0 0 0 1.8em var(--accent); }
    .v5.layout-focus .slabs { transform: rotate(0); left: -22%; }
    .v5.layout-focus .slab { height: 19%; border-radius: 0; }
    .v5.layout-service .orb { background: transparent; border: 2.6em solid var(--accent); box-shadow: none; }
    .v5.layout-type h2, .v5.layout-contact h2 { -webkit-text-stroke: 1px currentColor; color: transparent; }
    .v5.layout-type h2 span, .v5.layout-contact h2 span { color: var(--accent); -webkit-text-stroke: 0; }
    .v5.layout-stat .stat { color: transparent; -webkit-text-stroke: 2px var(--accent); }
    .v5.layout-index .work-item { grid-template-columns: 1fr auto; }
    .v5.layout-index .work-item small { display: none; }
    .v6.layout-brand, .v6.layout-type, .v6.layout-contact, .v6.layout-manifesto { background: linear-gradient(145deg,#050505 50%,color-mix(in srgb,var(--accent) 42%,#050505)); }
    .artboard.orange.v6.layout-brand,
    .artboard.orange.v6.layout-type,
    .artboard.orange.v6.layout-contact,
    .artboard.orange.v6.layout-manifesto { background-color: var(--accent); background-image: linear-gradient(145deg,#ffb39e 0%,var(--accent) 72%); }
    .v6.layout-focus .slabs { left: 18%; top: -9%; transform: rotate(24deg); }
    .v6.layout-service .orb { left: 41%; top: 10%; width: 78%; }
    .v6.layout-case .case-copy { left: 0; right: 0; bottom: 0; padding: 7%; background: var(--accent); color: #090909; }
    .v6.layout-case .case-copy .mono, .v6.layout-case .case-copy p { color: #090909; }

  <script>
    const projects = [
      {title:'Forever Estates', type:'Real estate in Dubai', image:'assets/forever-estates.webp', copy:'A lead-focused site for a Dubai real-estate consulting firm.', accent:'#ff6b45'},

      {title:'Geometric Games', type:'Browser puzzle game', image:'assets/geometric-games.webp', copy:'Interactive geometry puzzles built around direct manipulation.', accent:'#a98aff'},

      {title:'Websites & landing pages', copy:'Strategy, design, build, and an SEO-ready launch.'},
      {title:'Branding & identity', copy:'Logo, typography, colour, and a system that stays consistent.'},
      {title:'Apps & 3D motion', copy:'Product interfaces, interactive experiences, and commercial CGI.'}

    const statements = ['Built to ship.','Design. Code. Motion.','From first sketch to deployed product.','Pragmatic by default.','One team, one system.','Conversion-led, not decoration.','Make the complex feel obvious.','Identity that survives production.'];
    const stats = [
      {value:'100×', title:'faster scientific analysis code', copy:'C and Cython refactor with identical numerical results.'},
      {value:'1,465', title:'frontend notes in one open knowledge base', copy:'Seventeen topics, one fast publishing system.'},
      {value:'$1M+', title:'annual client revenue after launch', copy:'Forever Estates grew through a focused lead-capture system.'},
      {value:'3', title:'disciplines under one roof', copy:'Design, engineering, and motion move as one process.'}
    ];
    const families = ['All','Brand','Services','Work','Typography','Data','Process','Contact','Systems'];
    const palettes = [
      ['#ff5a2f','#ffb19d','dark'],['#79aaff','#c2ffe0','blue'],['#a78bff','#ffd3e8','lilac'],['#9ed776','#e2ffc4','green'],['#ff5a2f','#ffc0ad','light'],['#ff5a2f','#ff9c7d','orange']
    ];
    const ascii = 'AUTOCUBES  DESIGN  ENGINEERING  MOTION  BUILD  SHIP  SYSTEM  010110  GRID  TYPE  CODE  WEB  BRAND  APP  ';
    const templateFamilies = ['Brand','Brand','Services','Work','Work','Typography','Data','Process','Work','Contact','Systems','Work','Systems','Typography','Brand'];
    const ideaTemplates = [0,1,2,5,6,7,8,9,12,14];
    const ideaNames = {

    };

    const logo = () => '<img class="logo" src="/assets/brand/autocubes.svg" alt="">';

    const slabs = () => `<div class="slabs"><div class="slab">${logo()}</div><div class="slab">${logo()}</div><div class="slab">${logo()}</div></div>`;
    const themeClass = (palette) => palette[2] === 'dark' ? '' : palette[2];

    function artboard(ideaIndex, variantIndex, id) {
      const index = ideaIndex;
      const template = ideaTemplates[ideaIndex % ideaTemplates.length];
      const project = projects[(index * 5 + Math.floor(index / 15)) % projects.length];
      const project2 = projects[(index * 7 + 3) % projects.length];
      const service = services[(index * 2) % services.length];
      const palette = palettes[(variantIndex + index * 2) % palettes.length];
      const statement = statements[(index * 5 + 1) % statements.length];
      const stat = stats[(index + Math.floor(index / 15)) % stats.length];
      const vars = `--accent:${palette[0]};--accent2:${palette[1]}`;
      const ideaCycle = Math.floor(ideaIndex / ideaTemplates.length);
      const variant = (variantIndex + ideaCycle) % 8;
      const brandGeometry = (variantIndex + ideaCycle * 2) % 15;
      const common = `artboard ${themeClass(palette)} v${variant} b${brandGeometry}`;
      let html = '';
      if (template === 0) html = `<div class="${common} layout-brand" style="${vars}">${lockup()}<div class="grain"></div></div>`;
      if (template === 1) html = `<div class="${common} layout-focus" style="${vars}">${slabs()}<h2>What<br>we <em>do</em></h2>${lockup()}<span class="slide-no mono">01 / 05</span></div>`;

      if (template === 7) html = `<div class="${common} layout-process" style="${vars}"><span class="mono">How we work</span><h2>From brief<br>to launch.</h2><div class="steps">${['Define','Design','Build','Launch'].map((x,i)=>`<div class="step"><b>0${i+1}</b><strong>${x}</strong><span>→</span></div>`).join('')}</div></div>`;
      if (template === 8) html = `<div class="${common} layout-index" style="${vars}">${lockup()}<div class="work-list">${Array.from({length:5},(_,i)=>projects[(index+i*5)%projects.length]).map((x,i)=>`<div class="work-item"><small>0${i+1}</small><strong>${x.title}</strong><span>${x.type}</span></div>`).join('')}</div></div>`;
      if (template === 9) html = `<div class="${common} layout-contact" style="${vars}">${logo()}<h2>Start a<br><span>project.</span></h2><div class="email">contact@autocubes.site</div></div>`;
      if (template === 10) html = `<div class="${common} layout-grid" style="${vars}"><div class="cell image">${image(project)}</div><div class="cell mark">${logo()}</div><div class="cell word">${statement}</div><div class="cell info"><b>${project.title}</b><span>${project.type}<br><br>${String(id).padStart(3,'0')} / 200</span></div></div>`;
      if (template === 11) html = `<div class="${common} layout-vertical" style="${vars}"><div class="vertical-word">WORK</div><div class="image-panel">${image(project)}</div><div class="copy"><span class="mono">${project.type}</span><h2>${project.title}</h2><p>${project.copy}</p></div></div>`;
      if (template === 12) html = `<div class="${common} layout-ascii" style="${vars}"><div class="ascii">${ascii.repeat(24).slice(index,1600)}</div><h2>Design and engineering, in the same room.</h2></div>`;
      if (template === 13) html = `<div class="${common} layout-band" style="${vars}"><div class="band-image">${image(project)}</div><div class="band-copy"><strong>${project.title}</strong><span class="mono">${project.type}<br>${String(id).padStart(3,'0')} / 200</span></div><div class="band-image">${image(project2)}</div></div>`;
      if (template === 14) html = `<div class="${common} layout-manifesto" style="${vars}"><div class="line">Websites that explain.</div><div class="line">Brands that hold.</div><div class="line">Apps that work.</div><div class="line">Motion with a reason.</div>${lockup()}</div>`;
      return {html, family: templateFamilies[template], title: ideaNames[template][Math.floor(ideaIndex / ideaTemplates.length)], project, template: ideaIndex, engine: template};
    }

    const editableSelector = [
      '.brand-lockup', '.brand-lockup > img', '.brand-lockup > span', '.logo', '.slabs', '.slab', '.orb',
      'h2', 'p', 'span', 'strong', 'small', 'b', '.kicker', '.service-index', '.footline', '.stat', '.caption', '.rail', '.steps', '.step',
      '.work-list', '.work-item', '.email', '.ascii', '.line', '.vertical-word', '.image-panel', '.copy',
      '.band-copy', '.band-image', '.cell', '.case-copy', '.media', '.editor-added'
    ].join(',');

    function editRecord(id) {
      if (!edits[id]) edits[id] = {board:{}, nodes:{}, added:[]};
      return edits[id];
    }

    function saveEdits() {
      localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
    }

    function assignEditIds(board) {
      [...board.querySelectorAll(editableSelector)].filter(element => !element.closest('[data-added-id]')).forEach((element, index) => {
        element.dataset.editId = `e${index}`;
      });
    }

    function applyNodeStyle(element, node = {}) {
      const style = node.style || {};
      element.style.translate = `${Number(style.x || 0)}cqw ${Number(style.y || 0) * 1.25}cqw`;
      element.style.width = style.width === '' || style.width == null ? '' : `${style.width}cqw`;
      element.style.height = style.height === '' || style.height == null ? '' : `${Number(style.height) * 1.25}cqw`;
      element.style.padding = style.padding === '' || style.padding == null ? '' : `${style.padding}cqw`;
      element.style.fontSize = style.fontSize === '' || style.fontSize == null ? '' : `${style.fontSize}cqw`;
      element.style.opacity = style.opacity == null ? '' : String(style.opacity);
      element.style.color = style.color || '';
      element.style.backgroundColor = style.backgroundColor || '';
      element.style.borderRadius = style.borderRadius === '' || style.borderRadius == null ? '' : `${style.borderRadius}cqw`;
      element.style.textAlign = style.textAlign || '';
      element.style.zIndex = style.zIndex === '' || style.zIndex == null ? '' : String(style.zIndex);
      element.classList.toggle('editor-hidden', Boolean(node.hidden));
      if (typeof node.text === 'string' && element.children.length === 0) element.textContent = node.text;
    }

    function createAddedElement(item) {
      let element;
      if (item.type === 'mark') {
        element = document.createElement('img');
        element.src = '/assets/brand/autocubes.svg';
        element.alt = '';
        element.className = 'editor-added editor-added-mark';
      } else {
        element = document.createElement('div');
        element.className = `editor-added editor-added-${item.type}`;
        if (item.type === 'text') element.textContent = item.text || 'New text';
      }
      element.dataset.addedId = item.id;
      element.dataset.editId = item.id;
      applyNodeStyle(element, item);
      return element;
    }

    function applyStoredEdits(board, id) {
      if (!board) return;
      assignEditIds(board);
      const record = edits[id];
      if (!record) return;
      Object.entries(record.board || {}).forEach(([property, value]) => {
        if (property === 'accent') board.style.setProperty('--accent', value);
        else if (property === 'accent2') board.style.setProperty('--accent2', value);
        else if (property === 'backgroundColor') board.style.background = value;
        else board.style[property] = value;
      });
      Object.entries(record.nodes || {}).forEach(([key, node]) => {
        const element = board.querySelector(`[data-edit-id="${key}"]`);
        if (element) applyNodeStyle(element, node);
      });
      (record.added || []).forEach(item => board.appendChild(createAddedElement(item)));
    }

    function layerLabel(element) {
      if (element.dataset.addedId) return `Added ${element.dataset.addedId.replace(/^a\d+-/,'')}`;
      const text = element.children.length === 0 ? element.textContent.trim().replace(/\s+/g,' ').slice(0,28) : '';
      if (text) return text;
      const name = [...element.classList].find(item => !['editor-selected','editor-hidden'].includes(item));
      return name ? name.replace(/^layout-/,'').replace(/-/g,' ') : element.tagName.toLowerCase();
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"]/g, character => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[character]));
    }

    function currentBoard() {
      return document.querySelector('#modalArtboard .artboard');
    }

    function currentElement() {
      return editorState.selected === 'canvas' ? currentBoard() : currentBoard()?.querySelector(`[data-edit-id="${editorState.selected}"]`);
    }

    function nodeRecord(key = editorState.selected) {
      const record = editRecord(currentId);
      if (key.startsWith('a')) return record.added.find(item => item.id === key);
      if (!record.nodes[key]) record.nodes[key] = {style:{}};
      return record.nodes[key];
    }

    function selectEditorElement(key) {
      editorState.selected = key || 'canvas';
      currentBoard()?.querySelectorAll('.editor-selected').forEach(element => element.classList.remove('editor-selected'));
      if (editorState.selected !== 'canvas') currentElement()?.classList.add('editor-selected');
      renderLayers();
      renderInspector();
    }

    function renderLayers() {
      const board = currentBoard();
      if (!board) return;
      const elements = [...board.querySelectorAll('[data-edit-id]')];
      document.getElementById('layerCount').textContent = `${elements.length + 1}`;
      const rows = [{key:'canvas', label:'Canvas', hidden:false}, ...elements.map(element => ({
        key:element.dataset.editId,
        label:layerLabel(element),
        hidden:element.classList.contains('editor-hidden')
      }))];
      document.getElementById('layers').innerHTML = rows.map(row => `<div class="layer-row ${row.key === editorState.selected ? 'active' : ''} ${row.hidden ? 'is-hidden' : ''}" data-layer="${row.key}"><button class="layer-visibility" title="${row.hidden ? 'Show' : 'Hide'}">${row.key === 'canvas' ? '◆' : row.hidden ? '○' : '●'}</button><button class="layer-name">${escapeHTML(row.label)}</button><button class="layer-remove" title="Remove" ${row.key === 'canvas' ? 'disabled' : ''}>×</button></div>`).join('');
      document.querySelectorAll('.layer-row').forEach(row => {
        row.querySelector('.layer-name').onclick = () => selectEditorElement(row.dataset.layer);
        row.querySelector('.layer-visibility').onclick = () => row.dataset.layer !== 'canvas' && toggleLayer(row.dataset.layer);
        row.querySelector('.layer-remove').onclick = () => row.dataset.layer !== 'canvas' && removeLayer(row.dataset.layer);
      });
    }

    function rgbToHex(value, fallback = '#000000') {
      if (!value || value === 'transparent' || value === 'rgba(0, 0, 0, 0)') return fallback;
      if (value.startsWith('#')) return value.slice(0,7);
      const values = value.match(/[\d.]+/g);
      if (!values || values.length < 3) return fallback;
      return `#${values.slice(0,3).map(number => Math.round(Number(number)).toString(16).padStart(2,'0')).join('')}`;
    }

    function colorField(label, prop, value) {
      const hex = rgbToHex(value);
      return `<div class="editor-field"><label>${label}</label><div class="color-field"><input type="color" data-prop="${prop}" value="${hex}"><input data-prop="${prop}" value="${hex}"></div></div>`;
    }

    function numberField(label, prop, value, options = '') {
      return `<div class="editor-field"><label>${label}</label><input type="number" step="0.5" data-prop="${prop}" value="${value ?? ''}" ${options}></div>`;
    }

    function renderInspector() {
      const inspector = document.getElementById('inspector');
      const element = currentElement();
      if (!element) {
        inspector.innerHTML = '<div class="inspector-empty">Select a layer on the canvas.</div>';
        return;
      }
      if (editorState.selected === 'canvas') {
        const computed = getComputedStyle(element);
        document.getElementById('selectedType').textContent = 'Canvas';
        inspector.innerHTML = `<div class="field-grid">${colorField('Background','backgroundColor',computed.backgroundColor)}${colorField('Text','color',computed.color)}${colorField('Accent A','accent',computed.getPropertyValue('--accent').trim())}${colorField('Accent B','accent2',computed.getPropertyValue('--accent2').trim())}</div>`;
      } else {
        const node = nodeRecord();
        const style = node.style || (node.style = {});
        const computed = getComputedStyle(element);
        const editableText = element.children.length === 0 && element.tagName !== 'IMG';
        document.getElementById('selectedType').textContent = layerLabel(element);
        inspector.innerHTML = `<div class="field-grid">
          ${editableText ? `<div class="editor-field wide"><label>Content</label><textarea data-prop="text">${escapeHTML(element.textContent)}</textarea></div>` : ''}
          ${numberField('Offset X','x',style.x ?? 0)}${numberField('Offset Y','y',style.y ?? 0)}
          ${numberField('Width %','width',style.width)}${numberField('Height %','height',style.height)}
          ${numberField('Padding %','padding',style.padding)}${numberField('Type size','fontSize',style.fontSize)}
          ${numberField('Opacity %','opacity',style.opacity == null ? 100 : Math.round(style.opacity * 100),'min="0" max="100"')}${numberField('Radius %','borderRadius',style.borderRadius)}
          ${colorField('Text', 'color', style.color || computed.color)}${colorField('Fill','backgroundColor',style.backgroundColor || computed.backgroundColor)}
          <div class="editor-field"><label>Align</label><select data-prop="textAlign"><option value="">Auto</option><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select></div>
          ${numberField('Layer','zIndex',style.zIndex)}
        </div><div class="inline-actions"><button class="mini-button" id="toggleSelected">${node.hidden ? 'Show layer' : 'Hide layer'}</button><button class="mini-button danger" id="removeSelected">Remove layer</button></div>`;
        const align = inspector.querySelector('[data-prop="textAlign"]');
        if (align) align.value = style.textAlign || '';
        document.getElementById('toggleSelected').onclick = () => toggleLayer(editorState.selected);
        document.getElementById('removeSelected').onclick = () => removeLayer(editorState.selected);
      }
      inspector.querySelectorAll('[data-prop]').forEach(input => {
        input.oninput = () => updateProperty(input.dataset.prop, input.value, input);
      });
    }

    function updateProperty(property, value, source) {
      const board = currentBoard();
      if (editorState.selected === 'canvas') {
        const record = editRecord(currentId);
        record.board[property] = value;
        if (property === 'accent') board.style.setProperty('--accent', value);
        else if (property === 'accent2') board.style.setProperty('--accent2', value);
        else if (property === 'backgroundColor') board.style.background = value;
        else board.style[property] = value;
      } else {
        const node = nodeRecord();
        if (property === 'text') node.text = value;
        else if (property === 'opacity') node.style.opacity = Math.max(0, Math.min(100, Number(value))) / 100;
        else if (['color','backgroundColor','textAlign'].includes(property)) node.style[property] = value;
        else node.style[property] = value === '' ? '' : Number(value);
        applyNodeStyle(currentElement(), node);
      }
      if (source?.type === 'color') {
        const peer = source.parentElement.querySelector('input:not([type="color"])');
        if (peer) peer.value = value;
      } else if (source?.parentElement?.classList.contains('color-field')) {
        const peer = source.parentElement.querySelector('input[type="color"]');
        if (peer && /^#[0-9a-f]{6}$/i.test(value)) peer.value = value;
      }
      saveEdits();
    }

    function toggleLayer(key) {
      const node = nodeRecord(key);
      node.hidden = !node.hidden;
      applyNodeStyle(currentBoard().querySelector(`[data-edit-id="${key}"]`), node);
      saveEdits();
      renderLayers();
      renderInspector();
    }

    function removeLayer(key) {
      const record = editRecord(currentId);
      if (key.startsWith('a')) {
        record.added = record.added.filter(item => item.id !== key);
        currentBoard().querySelector(`[data-edit-id="${key}"]`)?.remove();
      } else {
        const node = nodeRecord(key);
        node.hidden = true;
        applyNodeStyle(currentBoard().querySelector(`[data-edit-id="${key}"]`), node);
      }
      saveEdits();
      selectEditorElement('canvas');
    }

    function addElement(type) {
      const record = editRecord(currentId);
      const item = {id:`a${Date.now()}-${type}`, type, text:type === 'text' ? 'New text' : '', style:{x:0,y:0,zIndex:12}};
      record.added.push(item);
      currentBoard().appendChild(createAddedElement(item));
      saveEdits();
      selectEditorElement(item.id);
    }

    function beginCanvasEditing() {
      const shell = document.getElementById('modalArtboard');
      const board = currentBoard();
      shell.classList.add('editing');
      board.addEventListener('pointerdown', event => {
        const target = event.target.closest('[data-edit-id]');
        if (!target || !board.contains(target)) {
          selectEditorElement('canvas');
          return;
        }
        event.preventDefault();
        selectEditorElement(target.dataset.editId);
        const style = nodeRecord().style || {};
        editorState.drag = {pointer:event.pointerId, startX:event.clientX, startY:event.clientY, x:Number(style.x || 0), y:Number(style.y || 0)};
        target.setPointerCapture(event.pointerId);
      });
      board.addEventListener('pointermove', event => {
        if (!editorState.drag || editorState.drag.pointer !== event.pointerId || editorState.selected === 'canvas') return;
        const rect = board.getBoundingClientRect();
        const node = nodeRecord();
        node.style.x = Math.round((editorState.drag.x + (event.clientX - editorState.drag.startX) / rect.width * 100) * 10) / 10;
        node.style.y = Math.round((editorState.drag.y + (event.clientY - editorState.drag.startY) / rect.height * 100) * 10) / 10;
        applyNodeStyle(currentElement(), node);
        const x = document.querySelector('[data-prop="x"]');
        const y = document.querySelector('[data-prop="y"]');
        if (x) x.value = node.style.x;
        if (y) y.value = node.style.y;
      });
      board.addEventListener('pointerup', event => {
        if (editorState.drag?.pointer === event.pointerId) {
          editorState.drag = null;
          saveEdits();
        }
      });
      selectEditorElement('canvas');
    }

    function templateName(template) {
      return ['Brand lockup','Layered identity','Focus area','Case cover','Editorial case','Type statement','Proof point','Process map','Work index','Contact card','Identity grid','Vertical case','Code field','Media band','Studio manifesto'][template];
    }

    let studyId = 1;
    const groups = Array.from({length:60}, (_,ideaIndex) => {
      const engine = ideaTemplates[ideaIndex % ideaTemplates.length];
      const variantCount = ideaIndex === 0 ? 60 : 8;
      const studies = Array.from({length:variantCount}, (_,variantIndex) => {
        const id = studyId++;
        return {id, ...artboard(ideaIndex, variantIndex, id)};
      });
      return {template:ideaIndex, engine, family:templateFamilies[engine], title:ideaNames[engine][Math.floor(ideaIndex / ideaTemplates.length)], studies};
    });
    const studies = groups.flatMap(group => group.studies);
    const storedPositions = JSON.parse(localStorage.getItem('autocubes-identity-v2-positions') || '{}');
    const positions = Object.fromEntries(groups.map(group => [group.template, Math.min(Number(storedPositions[group.template] || 0), group.studies.length - 1)]));
    let groupOrder = [...groups];
    const gallery = document.getElementById('gallery');
    const filters = document.querySelector('.filters');
    const counter = document.querySelector('.counter');

    families.forEach(family => {
      const button = document.createElement('button');
      button.className = `filter ${family === 'All' ? 'active' : ''}`;
      button.textContent = family;
      button.onclick = () => { activeFilter = family; pickedMode = false; document.getElementById('pickedOnly').classList.remove('active'); document.querySelectorAll('.filter').forEach(x=>x.classList.toggle('active',x===button)); applyFilters(); };
      filters.appendChild(button);
    });

    function activeStudy(group) { return group.studies[positions[group.template] || 0]; }

    function renderGallery(order = groupOrder) {
      gallery.innerHTML = order.map(group => {
        const study = activeStudy(group);
        const variant = (positions[group.template] || 0) + 1;
        return `<article class="composition ${picked.has(study.id) ? 'picked' : ''}" data-id="${study.id}" data-template="${group.template}" data-family="${group.family}"><div class="card-head"><span>Idea ${String(group.template + 1).padStart(2,'0')}</span><span class="family">${group.family} / ${group.title}</span><span class="spacer"></span><div class="variant-nav"><button data-delta="-1" title="Previous variant">←</button><span>${String(variant).padStart(2,'0')} / ${String(group.studies.length).padStart(2,'0')}</span><button data-delta="1" title="Next variant">→</button></div><button class="pick-button" title="Pick variant" aria-label="Pick variant">&#10003;</button></div>${study.html}</article>`;
      }).join('');
      gallery.querySelectorAll('.composition').forEach(card => {
        const board = card.querySelector('.artboard');
        applyStoredEdits(board, Number(card.dataset.id));
        board.onclick = () => openModal(Number(card.dataset.id));
        card.querySelector('.pick-button').onclick = () => togglePick(Number(card.dataset.id));
        card.querySelectorAll('.variant-nav button').forEach(button => button.onclick = () => cycleVariant(Number(card.dataset.template), Number(button.dataset.delta)));
      });
      applyFilters();
    }

    function cycleVariant(template, delta) {
      const group = groups[template];
      positions[template] = (positions[template] + delta + group.studies.length) % group.studies.length;
      localStorage.setItem('autocubes-identity-v2-positions', JSON.stringify(positions));
      renderGallery(groupOrder);
    }

    function applyFilters() {
      let visible = 0;
      gallery.querySelectorAll('.composition').forEach(card => {
        const showFamily = activeFilter === 'All' || card.dataset.family === activeFilter;
        const group = groups[Number(card.dataset.template)];
        const showPicked = !pickedMode || group.studies.some(study => picked.has(study.id));
        card.hidden = !(showFamily && showPicked);
        if (!card.hidden) visible++;
      });
      counter.textContent = `${visible} / 60 ideas · ${studies.length} variants`;
    }

    function togglePick(id) {
      picked.has(id) ? picked.delete(id) : picked.add(id);
      localStorage.setItem('autocubes-identity-v2-picked', JSON.stringify([...picked].sort((a,b)=>a-b)));
      if (currentId === id) updateModalPick();
      updateTray();
      renderGallery(groupOrder);
    }

    function updateTray() {
      const ids = [...picked].sort((a,b)=>a-b);
      document.getElementById('selectionTray').classList.toggle('visible', ids.length > 0);
      document.getElementById('selectionCount').textContent = `${ids.length} picked`;
      document.getElementById('selectionIds').textContent = ids.length ? ids.map(x=>String(x).padStart(3,'0')).join(' · ') : '';
    }

    function openModal(id) {
      currentId = Math.max(1, Math.min(studies.length,id));
      const study = studies[currentId-1];
      const group = groups[study.template];
      const variant = group.studies.findIndex(item => item.id === study.id) + 1;
      document.getElementById('modalArtboard').innerHTML = study.html;
      applyStoredEdits(currentBoard(), currentId);
      document.getElementById('modalEyebrow').textContent = `Idea ${String(study.template + 1).padStart(2,'0')} · Variant ${String(variant).padStart(2,'0')} / ${String(group.studies.length).padStart(2,'0')} · ${study.family}`;
      document.getElementById('modalTitle').textContent = study.title;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
      updateModalPick();
      beginCanvasEditing();
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; renderGallery(groupOrder); }
    function updateModalPick() { document.getElementById('modalPick').textContent = picked.has(currentId) ? 'Remove from picked' : 'Pick this composition'; }
    function cycleModal(delta) {
      const study = studies[currentId - 1];
      const group = groups[study.template];
      const index = group.studies.findIndex(item => item.id === currentId);
      openModal(group.studies[(index + delta + group.studies.length) % group.studies.length].id);
    }

    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
    document.getElementById('modalPick').onclick = () => togglePick(currentId);
    document.getElementById('prevComposition').onclick = () => cycleModal(-1);
    document.getElementById('nextComposition').onclick = () => cycleModal(1);
    document.getElementById('addText').onclick = () => addElement('text');
    document.getElementById('addMark').onclick = () => addElement('mark');
    document.getElementById('addShape').onclick = () => addElement('shape');
    document.getElementById('resetComposition').onclick = () => {
      delete edits[currentId];
      saveEdits();
      openModal(currentId);
    };
    document.getElementById('shuffle').onclick = () => { groupOrder = [...groups].sort(()=>Math.random()-.5); renderGallery(groupOrder); };
    document.getElementById('pickedOnly').onclick = e => {
      pickedMode = !pickedMode;
      if (pickedMode) groups.forEach(group => {
        const pickedIndex = group.studies.findIndex(study => picked.has(study.id));
        if (pickedIndex >= 0) positions[group.template] = pickedIndex;
      });
      e.currentTarget.classList.toggle('active',pickedMode);
      renderGallery(groupOrder);
    };
    document.getElementById('clearSelection').onclick = () => { picked.clear(); localStorage.removeItem('autocubes-identity-v2-picked'); updateTray(); renderGallery(groupOrder); };
    document.getElementById('exportSelection').onclick = () => {
      const ids = [...picked].sort((a,b)=>a-b);
      const blob = new Blob([JSON.stringify({project:'autocubes identity lab',selected:ids.map(id=>({id:`AC-${String(id).padStart(3,'0')}`,family:studies[id-1].family,title:studies[id-1].title,edits:edits[id] || null}))},null,2)],{type:'application/json'});
      const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'autocubes-identity-selection.json'; link.click(); URL.revokeObjectURL(link.href);
    };
    document.addEventListener('keydown', event => {
      if (!document.getElementById('modal').classList.contains('open')) return;
      const isField = ['INPUT','TEXTAREA','SELECT'].includes(event.target.tagName);
      if (event.key === 'Escape') closeModal();
      if (!isField && editorState.selected !== 'canvas' && event.key.startsWith('Arrow')) {
        event.preventDefault();
        const node = nodeRecord();
        const distance = event.shiftKey ? 2 : .5;
        if (event.key === 'ArrowLeft') node.style.x = Number(node.style.x || 0) - distance;
        if (event.key === 'ArrowRight') node.style.x = Number(node.style.x || 0) + distance;
        if (event.key === 'ArrowUp') node.style.y = Number(node.style.y || 0) - distance;
        if (event.key === 'ArrowDown') node.style.y = Number(node.style.y || 0) + distance;
        applyNodeStyle(currentElement(), node);
        saveEdits();
        renderInspector();
      } else if (!isField && event.key === 'ArrowLeft') cycleModal(-1);
      else if (!isField && event.key === 'ArrowRight') cycleModal(1);
      if (!isField && ['Delete','Backspace'].includes(event.key) && editorState.selected !== 'canvas') removeLayer(editorState.selected);
      if (!isField && event.key.toLowerCase() === 'f') togglePick(currentId);
    });
    renderGallery();
    updateTray();
  </script>
</body>
</html>
