<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>autocubes cover</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      color: #f5f5f2;
      background: #050505;
      font-family: Arial, Helvetica, sans-serif;
    }
    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }
    .signature {
      display: flex;
      align-items: center;
      gap: 46px;
      transform: translateY(-16px);
    }
    .mark-shell {
      width: 214px;
      height: 214px;
      display: grid;
      place-items: center;
      border-radius: 38px;
      background: #ff5a2f;
    }
    .mark {
      width: 126px;
      height: 126px;
    }
    .word {
      font-size: 142px;
      font-weight: 700;
      line-height: .88;
      letter-spacing: -7px;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <div class="signature">
      <div class="word">autocubes</div>
      <div class="mark-shell"><img class="mark" src="/assets/brand/autocubes.svg" alt="" /></div>
    </div>
  </main>
</body>
</html>
