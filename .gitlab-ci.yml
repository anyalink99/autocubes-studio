stages:
  - verify
  - build

default:
  image: node:22-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

typecheck:
  stage: verify
  script:
    - npm run typecheck
    - npm run qa:sync

build:
  stage: build
  script:
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - dist/
