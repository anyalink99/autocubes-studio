name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  studio:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - run: npm audit --audit-level=moderate
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: studio-qa
          path: out/qa
          retention-days: 7
